[pytest]
# ---------------------------------------------------------------------------
# sayou-chunking test configuration
# ---------------------------------------------------------------------------
testpaths = tests

# Custom markers — prevents PytestUnknownMarkWarning
markers =
    integration: marks tests that touch real I/O (file system, network, DB).
                 Run with: pytest -m integration
                 Exclude with: pytest -m "not integration"
    slow: marks tests that are notably slow (large inputs, many iterations).
          Run with: pytest -m slow

# Display: show short summary for failures, errors, and skips
addopts =
    -ra
    --tb=short
    --strict-markers