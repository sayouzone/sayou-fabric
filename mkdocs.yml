site_name: Sayou Fabric
site_description: Modular framework for building production-grade LLM data pipelines and knowledge graphs.
site_author: Sayouzone
site_url: https://sayouzone.github.io/sayou-fabric/
copyright: Copyright &copy; 2026 Sayouzone | All rights reserved.
repo_name: sayouzone/sayou-fabric
repo_url: https://github.com/sayouzone/sayou-fabric
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/sayou_logo.png
  favicon: assets/favicon.png

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  font:
    text: DM Sans
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - announce.dismiss
    - navigation.footer

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://sayouzone.com/
      name: Sayouzone Official Website
    - icon: fontawesome/brands/github
      link: https://github.com/sayouzone/sayou-fabric
      name: Sayou Fabric on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/search/?q=sayou
      name: Sayouzone on PyPI

  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_KEY, ""]


plugins:
  - search:
      lang: en
  - include-markdown:
      rewrite_relative_urls: false
      preserve_includer_indent: false
      dedent: true
  - mkdocstrings:
      enabled: !ENV [ENABLE_MKDOCSTRINGS, false]
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

